# OpenSkyscraper - Docker Compose
# Usage: docker compose up -d
#        docker compose exec openskyscraper bash
# VNC: connect to localhost:5900 (VNC client) or http://localhost:6080/vnc.html (noVNC in browser)

services:
  openskyscraper:
    build:
      context: .
      dockerfile: Dockerfile
    image: openskyscraper:latest
    container_name: openskyscraper-ubuntu-20.04
    ports:
      - "5900:5900"
      - "6080:6080"
    volumes:
      - .:/app
    environment:
      - DISPLAY=${DISPLAY:-}
      - QT_X11_NO_MITSHM=1
    working_dir: /app
    stdin_open: true
    tty: true
    # Build the game: docker compose run --rm openskyscraper bash -lc "git submodule update --init . && mkdir -p build && cd build && cmake .. && make"
    # Run the game (inside container with VNC): open noVNC at http://localhost:6080, then in container terminal: cd build && ./OpenSkyscraper

